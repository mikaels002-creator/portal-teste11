  function ManageView(){
    // Calculate per-building stats
    var bldStats = buildings.map(function(b){
      var u=getUnits(b.id);
      var av=u.filter(function(x){return x.status==="available"}).length;
      var rs=u.filter(function(x){return x.status==="reserved"}).length;
      var sd=u.filter(function(x){return x.status==="sold"}).length;
      var vgv=u.reduce(function(s,x){return s+cp(x,b)},0);
      return{b:b,units:u,av:av,rs:rs,sd:sd,total:u.length,vgv:vgv,pctSold:u.length>0?Math.round((sd+rs)/u.length*100):0};
    });
    var maxVgv=Math.max.apply(null,bldStats.map(function(s){return s.vgv||1}));

    return(
      <div style={{padding:"20px clamp(16px, 4vw, 48px)"}}>
        <div className="au" style={{marginBottom:28}}>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:28,fontWeight:500,letterSpacing:"-0.02em"}}>Dashboard</div>
          <div style={{fontSize:14,color:"#4CAF7D",marginTop:4,display:"flex",alignItems:"center",gap:6}}><span style={{width:6,height:6,borderRadius:"50%",background:"#4CAF7D"}}/>Conectado 脗路 Supabase</div>
        </div>

  var printBld = function(bid,mode){DB.trackEvent("pdf_export",{building_id:bid});logAction("export_pdf","buildings",bid,null,{modo:mode});
    var b=buildings.find(function(x){return x.id===bid});if(!b)return;

    var rsCount=allU.filter(function(u){return u.status==="reserved"}).length;
    var sdCount=allU.filter(function(u){return u.status==="sold"}).length;
    // Split units into 2 columns
    var half=Math.ceil(units.length/2);
    var col1=units.slice(0,half);
    var col2=units.slice(half);
    var makeRows=function(arr){return arr.map(function(u){var p=cp(u,b);var showPrice=u.status==="available";var sc=u.status==="available"?"#2e7d52":u.status==="reserved"?"#e67e22":"#c0392b";return "<tr><td style='padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;font-weight:600'>"+u.name+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;text-align:center'>"+u.area+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;text-align:right;font-weight:600;color:"+sc+"'>"+(showPrice&&p>0?fmtV(p):"芒聙聰")+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee;font-size:10px;text-align:center;color:"+sc+"'>"+sL[u.status]+"</td></tr>"}).join("")};
    var tableHtml=function(arr){return "<table style='width:100%;border-collapse:collapse'><thead><tr style='background:#f5f0e8'><th style='padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #ddd'>Unid.</th><th style='padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #ddd'>m脗虏</th><th style='padding:6px 8px;text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #ddd'>Valor"+(showUsd?" (USD)":"")+"</th><th style='padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #ddd'>Status</th></tr></thead><tbody>"+makeRows(arr)+"</tbody></table>"};
    var html="<html><head><meta charset='UTF-8'><title>"+b.name+" 芒聙聰 Tabela de Vendas</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;padding:28px 32px;color:#1a1a1a;max-width:820px;margin:0 auto}@media print{body{padding:20px}}</style></head><body>";

    html+="<div style='display:flex;gap:12px;margin-bottom:14px'>";

    html+="<div style='flex:1;padding:8px;background:#f5f0e8;border-radius:8px;text-align:center'><div style='font-size:20px;font-weight:700;color:#1a1a1a'>"+allU.length+"</div><div style='font-size:9px;color:#888'>Total</div></div>";

            var row=rows[y].sort(function(a,b){return a.x-b.x});
            var line=row.map(function(r){return r.text}).join(" | ");
            allText+=line+"\n";
          });

        var units=[];

        var lastAreaNums=[];

        pdfLines.forEach(function(line){
          var parts=line.split("|").map(function(p){return p.trim()}).filter(function(p){return p.length>0});
          if(parts.length<1)return;

          // Find unit names (3-4 digit numbers, optionally "- Type")
          var unitEntries=[];
          parts.forEach(function(p,idx){
            if(/^\d{3,4}(\s*-\s*(Master|Luxo|Superior|Standard|Studio|Loja|Sala|Ap\w*))?$/.test(p)){
              unitEntries.push({idx:idx,name:p});
            }
          });

          // If NO units found, extract area numbers for next line
          if(unitEntries.length===0){
            var nums=[];
            parts.forEach(function(p){
              var m=p.match(/^(\d+[.,]\d+)$/);
              if(m){var v=parseFloat(m[1].replace(",","."));if(v>5&&v<500)nums.push(v)}
              else{var m2=p.match(/^(\d{2})$/);if(m2){var v2=parseInt(m2[1]);if(v2>=15&&v2<=99)nums.push(v2)}}
            });
            if(nums.length>=2) lastAreaNums=nums;
            return;
          }

          // Process each unit on this line
          unitEntries.forEach(function(entry,uiIdx){
            var name=entry.name;
            var nextIdx=uiIdx<unitEntries.length-1?unitEntries[uiIdx+1].idx:parts.length;
            var segment=parts.slice(entry.idx+1,nextIdx);

            var area=0;var price=0;var status="available";
            var inlineAreas=[];

            segment.forEach(function(s){

              if(/^R\$/.test(s)){
                var pv=parseFloat(s.replace(/R\$\s*/,"").replace(/\./g,"").replace(",","."));
                if(pv>10000) price=pv;
                return;
              }
              var numM=s.match(/^(\d+[.,]?\d*)$/);
              if(numM){

                if(v>5&&v<500) inlineAreas.push(v);
